import = ["~/.config/alacritty/colors.toml"]

[font]
size = 11

[font.normal]
family = "FiraCode Nerd Font"

[font.bold]
style = "Bold"

[font.italic]
style = "Italic"

[font.bold_italic]
style = "Bold Italic"

[window]
dynamic_padding = true
padding = { x = 15, y = 15 }
startup_mode = "Windowed"
dynamic_title = true
decorations = "Full"
opacity = 0.95

[cursor]
style = "Underline"
